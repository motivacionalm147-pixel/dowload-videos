<!doctype html>
<html lang="en" style="background:#0F172A;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <title>Mídia Download LK</title>
    <!-- 30 Custom Google Fonts for Subtitle Generator -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Alfa+Slab+One&family=Anton&family=Bangers&family=Bebas+Neue&family=Bungee&family=Caveat:wght@700&family=Cinzel:wght@700&family=Courgette&family=Dancing+Script:wght@700&family=Fredoka:wght@600&family=Inter:wght@400;700&family=Lobster&family=Montserrat:wght@700&family=Orbitron:wght@700&family=Oswald:wght@600&family=Pacifico&family=Permanent+Marker&family=Playfair+Display:wght@700&family=Press+Start+2P&family=Raleway:wght@700&family=Righteous&family=Rubik:wght@700&family=Russo+One&family=Sacramento&family=Satisfy&family=Shadows+Into+Light&family=Special+Elite&family=Titan+One&display=swap" rel="stylesheet">
    <style>
      html, body, #root {
        background: #0F172A !important;
        min-height: 100vh;
        margin: 0;
      }
      /* Fallback loading UI while React boots */
      .app-fallback-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0F172A;
        color: #94A3B8;
        font-family: 'Inter', system-ui, sans-serif;
      }
      .app-fallback-loader .spinner {
        width: 40px; height: 40px;
        border: 3px solid #1E293B;
        border-top-color: #6366F1;
        border-radius: 50%;
        animation: fspin 0.8s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes fspin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body style="background:#0F172A;">
    <div id="root">
      <!-- Fallback UI shown BEFORE React mounts or if it crashes -->
      <div class="app-fallback-loader">
        <div class="spinner"></div>
        <p style="font-size:14px;font-weight:600;color:#CBD5E1;">Carregando Mídia Download LK...</p>
        <p style="font-size:11px;color:#64748B;margin-top:4px;">Conectando ao servidor</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
